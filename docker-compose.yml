services:
  browser-assistant:
    build: .
    container_name: openclaw-human-browser
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # noVNC web interface
      - "6080:6080"

      # Approval API
      - "8787:8787"

      # CDP exposed only to local machine.
      # OpenClaw on the same VM can connect to http://127.0.0.1:9222
      - "127.0.0.1:9222:9222"
    volumes:
      - ./chrome-profile:/data/chrome-profile
    shm_size: "1gb"
